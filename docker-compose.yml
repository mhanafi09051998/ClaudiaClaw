# ============================================================
# ClaudiaClaw 🦞 — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d
#
# Dengan file .env:
#   DEEPSEEK_API_KEY=sk-xxx
#   TELEGRAM_BOT_TOKEN=xxx:xxx
#   TELEGRAM_WEBHOOK_URL=https://domain-anda.com
# ============================================================

services:
  claudiaclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudiaclaw
    restart: unless-stopped

    # Environment dari file .env
    env_file:
      - .env

    # Port untuk webhook (Telegram requires 8443, 443, 80, 88)
    ports:
      - "8443:8443"

    # Persistence
    volumes:
      - claudiaclaw_data:/app/data
      - ./skills:/app/skills:ro

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8443/health').then(r => process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claudiaclaw_data:
    name: claudiaclaw_data
